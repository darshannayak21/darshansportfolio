  <body>
    <script>
      (function(){
        // Theme
        var t=localStorage.getItem('theme');if(t==='light'){document.documentElement.classList.remove('dark');document.documentElement.classList.add('light')}
        // Force scroll to top on every page load (refresh) — runs before React
        if('scrollRestoration' in history) history.scrollRestoration='manual';
        window.scrollTo(0,0);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
